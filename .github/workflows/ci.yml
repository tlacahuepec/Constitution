name: CI

on:
  push:
    branches: [ dev, main, release/** ]
  pull_request:
    branches: [ dev, main, release/** ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup language-specific tools
        # Add steps here based on language (Python, Kotlin, Node, etc.)

      - name: Run linting & formatting
        run: echo "Run your linter here (Ruff, Spotless, ktlint, etc.)"

      - name: Run tests
        run: echo "Run your test suite here (pytest, ./gradlew test, etc.)"

      - name: Build / Compile
        run: echo "Build step here"

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          exit-code: 1